project: detour-local-test-harness
description: >
  Add a self-contained test harness binary that wires the detour proxy between a
  real Ollama backend and a fake Anthropic sentinel server, then verifies local
  model traffic never leaks to the Anthropic URL.

tasks:
  - id: T001
    title: Create internal/harness/sentinel.go
    file: internal/harness/sentinel.go
    status: pending
    priority: high
    depends_on: []
    description: |
      Package: harness

      Define the constant:
        const SentinelMarker = "DETOUR_HARNESS_SENTINEL_TRAFFIC_LEAK_DETECTED"

      Define the Sentinel struct with fields:
        server   *httptest.Server
        hitCount atomic.Int64

      Implement:
        NewSentinel() *Sentinel
          - Creates an http.ServeMux
          - Registers handlers: /v1/messages, /v1/models, /harness/status
          - Starts httptest.NewServer(mux) and assigns to s.server
          - Returns the ready-to-use *Sentinel (already listening)

        (s *Sentinel) URL() string
          - Returns s.server.URL

        (s *Sentinel) HitCount() int64
          - Returns s.hitCount.Load()

        (s *Sentinel) Close()
          - Calls s.server.Close()

        (s *Sentinel) handleMessages(w, r)
          - Increments s.hitCount via Add(1)
          - Writes Content-Type: application/json
          - Encodes a valid Anthropic Messages API response shape with
            content[0].text = SentinelMarker, id = "msg_sentinel_001",
            stop_reason = "end_turn", usage = {input_tokens:1, output_tokens:1}

        (s *Sentinel) handleModels(w, r)
          - Increments s.hitCount via Add(1)
          - Returns a models list with one entry whose display_name = SentinelMarker

        (s *Sentinel) handleStatus(w, r)
          - Returns {"hit_count": <current count>} without incrementing

      Imports: encoding/json, net/http, net/http/httptest, sync/atomic
    acceptance_criteria:
      - File compiles with `go build ./internal/harness/...`
      - SentinelMarker constant equals exactly "DETOUR_HARNESS_SENTINEL_TRAFFIC_LEAK_DETECTED"
      - NewSentinel() returns a server already accepting connections
      - HitCount() returns 0 before any requests, increments on each call to /v1/messages or /v1/models
      - /harness/status does not increment HitCount
      - /v1/messages response body contains SentinelMarker in content[0].text
      - Close() shuts down the server without error

  - id: T002
    title: Create internal/harness/adapter.go
    file: internal/harness/adapter.go
    status: pending
    priority: high
    depends_on: []
    description: |
      Package: harness

      Define unexported data-transfer structs (all in same file):
        anthropicRequest  { Model string, Messages []anthropicMessage, MaxTokens int }
        anthropicMessage  { Role string, Content string }
        ollamaRequest     { Model string, Messages []ollamaMessage, Stream bool }
        ollamaMessage     { Role string, Content string }
        ollamaResponse    { Model string, Message ollamaMessage, Done bool }

      Define the Adapter struct with fields:
        server    *httptest.Server
        ollamaURL string
        model     string

      Implement:
        NewAdapter(ollamaURL, model string) *Adapter
          - Creates mux, registers /v1/messages -> a.handleMessages
          - Starts httptest.NewServer(mux) and assigns to a.server
          - Returns ready *Adapter (already listening)

        (a *Adapter) URL() string  -- returns a.server.URL
        (a *Adapter) Close()       -- calls a.server.Close()

        (a *Adapter) handleMessages(w, r)
          Step 1: io.ReadAll(r.Body); unmarshal into anthropicRequest.
                  On error: call writeAdapterError(w, 400, msg); return.
          Step 2: Build ollamaRequest using a.model (NOT req.Model),
                  copy role+content from each anthropicMessage, set Stream=false.
          Step 3: json.Marshal(ollamaReq); on error: writeAdapterError 500.
          Step 4: http.Post(a.ollamaURL+"/api/chat", "application/json", body).
                  On transport error: writeAdapterError 502 "ollama unavailable: ...".
                  On non-200 status: read body, writeAdapterError 502 "ollama returned HTTP N: <body>".
          Step 5: json.NewDecoder(resp.Body).Decode(&ollamaResponse).
                  On error: writeAdapterError 502 "could not decode ollama response: ...".
          Step 6: Write Content-Type: application/json; encode Anthropic response shape
                  with id="msg_adapter_001", type="message", role="assistant",
                  content[0]={type:"text", text: ollamaResp.Message.Content},
                  model=a.model, stop_reason="end_turn", stop_sequence=nil,
                  usage={input_tokens:1, output_tokens:1}.

        writeAdapterError(w, status int, msg string)
          - Sets Content-Type: application/json, writes status code,
            encodes {"type":"error","error":{"type":"proxy_error","message":msg}}

      Imports: bytes, encoding/json, fmt, io, net/http, net/http/httptest
    acceptance_criteria:
      - File compiles with `go build ./internal/harness/...`
      - NewAdapter() returns a server already accepting connections
      - handleMessages correctly maps anthropic request fields to ollama format,
        using a.model not req.Model
      - Stream is always set to false in the outgoing Ollama request
      - Ollama transport errors produce HTTP 502 with JSON error body
      - Successful Ollama response is translated back to valid Anthropic Messages shape
      - writeAdapterError sets both the status code and JSON body correctly

  - id: T003
    title: Create cmd/harness/main.go
    file: cmd/harness/main.go
    status: pending
    priority: medium
    depends_on:
      - T001
      - T002
    description: |
      Package: main
      Module imports: github.com/trydydd/detour/internal/harness,
                      github.com/trydydd/detour/internal/proxy

      Flags (use flag package):
        --model-name  string  default "qwen2:0.5b"   Ollama model tag
        --ollama-url  string  default "http://localhost:11434"
        --port        int     default 18888

      main() startup sequence (order is critical):
        1. flag.Parse()
        2. Print banner with model, ollama URL, proxy port
        3. checkOllama(*ollamaURL, *modelName) — exits on failure
        4. adapter := harness.NewAdapter(*ollamaURL, *modelName); defer adapter.Close()
        5. sentinel := harness.NewSentinel(); defer sentinel.Close()
        6. authToken := generateToken()
        7. os.Setenv("ANTHROPIC_DETOUR_AUTH", authToken) — MUST precede NewMux
        8. proxyCfg := &proxy.Config{ModelName: *modelName,
                                      LocalUpstreamURL: adapter.URL(),
                                      AnthropicUpstreamURL: sentinel.URL()}
        9. mux := proxy.NewMux(proxyCfg)
        10. Start http.Server{Addr: "127.0.0.1:<port>", Handler: mux} in goroutine;
            log non-ErrServerClosed errors to stderr
        11. waitForPort(addr, 3*time.Second) — exit 1 on timeout
        12. Run testLocalModelStaysLocal and testPassthroughHitsSentinel;
            track passed/failed counts
        13. Graceful shutdown: context.WithTimeout(background, 2s); srv.Shutdown(ctx)
        14. Print summary; os.Exit(1) if failed > 0

      testLocalModelStaysLocal(proxyBase, authToken, modelName string, sentinel *harness.Sentinel) bool
        - Record hitsBefore = sentinel.HitCount()
        - POST {"model":<modelName>,"messages":[{"role":"user","content":"Reply with exactly the word: pong"}],"max_tokens":20}
        - Fail if HTTP error, non-200 status, sentinel.HitCount() increased, or
          response body contains harness.SentinelMarker
        - On pass: print sentinel hit count (0) and truncated response text

      testPassthroughHitsSentinel(proxyBase, authToken string, sentinel *harness.Sentinel) bool
        - Record hitsBefore = sentinel.HitCount()
        - POST {"model":"claude-3-5-sonnet-20241022","messages":[{"role":"user","content":"ping"}],"max_tokens":10}
        - Fail if HTTP error, non-200 status, sentinel.HitCount() did NOT increase,
          or response body does NOT contain harness.SentinelMarker
        - On pass: print new hit count

      postMessages(proxyBase, authToken, jsonBody string) (string, int, error)
        - Builds POST request to proxyBase+"/v1/messages"
        - Sets Content-Type: application/json and X-Detour-Auth: <authToken>
        - Returns (body string, status code, error)

      extractText(responseBody string) string
        - Unmarshals Anthropic response; returns content[0].text if type=="text"
        - Falls back to returning raw responseBody on any parse error

      checkOllama(ollamaURL, modelName string)
        - GET ollamaURL+"/api/tags"; exit 1 with helpful message if unreachable
        - Decode response; check models[].name for exact match or "<name>:" prefix
        - Exit 1 with "ollama pull <modelName>" hint if not found

      waitForPort(addr string, timeout time.Duration) error
        - Poll net.DialTimeout("tcp", addr, 100ms) every 50ms until success or deadline
        - Return fmt.Errorf("timed out waiting for %s", addr) on expiry

      generateToken() string
        - crypto/rand.Read 32 bytes; return hex.EncodeToString; exit 1 on rand error

      firstN(s string, n int) string
        - Return s[:n]+"..." if len(s)>n, else s

      Imports: context, crypto/rand, encoding/hex, encoding/json, flag, fmt, io,
               net, net/http, os, strings, time
    acceptance_criteria:
      - `go build ./cmd/harness` succeeds
      - Running with no Ollama prints a clear error and exits non-zero
      - Running against a live Ollama with the model pulled executes both tests
        and exits 0 when both pass
      - ANTHROPIC_DETOUR_AUTH is set before proxy.NewMux is called
      - LocalUpstreamURL points to adapter.URL() not directly to Ollama
      - AnthropicUpstreamURL points to sentinel.URL() not to api.anthropic.com
      - Test 1 fails with descriptive message if sentinel hit count increases
      - Test 2 fails with descriptive message if sentinel is not hit
      - Final summary line reads "RESULT: ALL TESTS PASSED (2/2)" on success

  - id: T004
    title: Create scripts/harness-setup.sh
    file: scripts/harness-setup.sh
    status: pending
    priority: low
    depends_on: []
    description: |
      Bash convenience script to prepare the environment before running the harness.

      Shebang: #!/usr/bin/env bash
      Options: set -euo pipefail

      Behavior:
        MODEL="${1:-qwen2:0.5b}"   # first positional arg, default qwen2:0.5b

        1. Print header showing selected model name.
        2. Check `command -v ollama`; if missing, print install URL
           (https://ollama.com/download) and exit 1.
        3. Check if Ollama is running: `curl -sf http://localhost:11434/api/tags`
           If not running: run `ollama serve &` then `sleep 3`.
        4. Check if model is already present: `ollama list | grep -q "^${MODEL}"`
           If present: print "✓ $MODEL already available"
           If absent: run `ollama pull "$MODEL"`
        5. Print completion message with the exact `go run` invocation.

      The script must be executable (chmod +x applied outside the file content itself).
    acceptance_criteria:
      - Script is valid bash and passes `bash -n scripts/harness-setup.sh`
      - Running with no args uses model "qwen2:0.5b"
      - Running with a model arg (e.g., `bash scripts/harness-setup.sh tinyllama`)
        uses that model name throughout
      - Exits 1 with a clear message if ollama binary is not found
      - Does not fail if ollama is already running
      - Does not re-pull a model that is already present

  - id: T005
    title: Verify harness builds and runs end-to-end
    file: cmd/harness/main.go
    status: pending
    priority: low
    depends_on:
      - T001
      - T002
      - T003
      - T004
    description: |
      Final validation task. With all source files in place:

      1. Run `go build ./...` from the repo root — must produce zero errors.
      2. Run `go vet ./cmd/harness/... ./internal/harness/...` — must produce zero warnings.
      3. With Ollama running and qwen2:0.5b pulled, run:
           go run ./cmd/harness --model-name qwen2:0.5b
         and confirm the exit code is 0 and the output ends with
         "RESULT: ALL TESTS PASSED (2/2)".
      4. Confirm the string "api.anthropic.com" does not appear anywhere in the
         new files (sentinel URL is always a local httptest address).
      5. Confirm no new external Go module dependencies were introduced
         (go.mod and go.sum are unchanged).
    acceptance_criteria:
      - `go build ./...` exits 0 with no output
      - `go vet ./cmd/harness/... ./internal/harness/...` exits 0 with no output
      - End-to-end run exits 0 and prints "RESULT: ALL TESTS PASSED (2/2)"
      - Neither sentinel.go, adapter.go, nor main.go reference "api.anthropic.com"
      - go.mod is unchanged (no new dependencies)
