# Docker Container Work Ledger
# Generated: 2026-05-04
# Companion plan: docs/docker-container-plan.md
#
# This ledger is RALPH-loop friendly:
#   * Each item is atomic — a loop iteration can pick the lowest-id pending
#     item whose `depends_on` are all `completed`, do it, and stop.
#   * Each item carries everything the loop needs in one place: the files
#     to touch, acceptance criteria, TDD steps, and validation commands.
#   * `status` transitions: pending → in_progress → requires_validation
#     → completed (or back to in_progress on validation failure).
#   * Never edit acceptance_criteria from inside a loop iteration; raise
#     a new item instead.

metadata:
  plan: "docs/docker-container-plan.md"
  scope: "Build, document, and CI-test an Alpine-based detour + Claude Code container."
  generated: "2026-05-04"
  tdd_principle: "Red → Green → Refactor. Tests live next to code where possible; container-level checks live in scripts/test-docker.sh."

ralph_loop:
  next_item_selection: |
    1. Filter items where status == "pending".
    2. Drop any whose depends_on contains an id that is not "completed".
    3. Sort the remainder by id ascending.
    4. The first item is the next one to work on.
  iteration_contract:
    pre:
      - "Re-read the item's acceptance_criteria and tdd_steps verbatim."
      - "Re-read docs/docker-container-plan.md sections referenced by the item."
      - "Set status to in_progress and record start time in fix_notes."
    do:
      - "Work the tdd_steps in order. Do not skip the failing-test step."
      - "Touch only the files listed in files_to_create / files_to_modify."
      - "If you discover the item is wrong, set status back to pending, write a note, and exit — let the human re-plan."
    post:
      - "Run every command in validation_commands. All must exit 0."
      - "Set status to requires_validation and append a one-line summary to fix_notes."
      - "Stop. The next loop iteration picks up the next item."
  bail_conditions:
    - "Any validation_command exits non-zero — leave status in_progress and write a note."
    - "An item depends on something that is now blocked — flag and stop."
    - "Acceptance criteria can no longer be met without scope expansion — stop."

status_workflow:
  states: [pending, in_progress, requires_validation, completed, blocked]
  transitions:
    - from: pending
      to: in_progress
      trigger: "Loop iteration starts work on this item."
    - from: in_progress
      to: requires_validation
      trigger: "Implementation + tests complete and validation_commands pass locally."
    - from: requires_validation
      to: completed
      trigger: "Human review or CI run confirms the change."
    - from: requires_validation
      to: in_progress
      trigger: "Reviewer or CI flags an issue."
    - from: pending
      to: blocked
      trigger: "External dependency (e.g. registry credentials) is missing."

items:
  - id: D1
    title: "Author the multi-stage Dockerfile"
    status: pending
    depends_on: []
    files_to_create:
      - Dockerfile
      - .dockerignore
    files_to_modify: []
    description: |
      Create a two-stage Dockerfile that builds a static `detour` binary in a
      golang:1.24-alpine builder, then assembles a runtime image on
      alpine:3.20 with nodejs, npm, bash, git, curl, ca-certificates, and
      tini. Install @anthropic-ai/claude-code globally via npm. Copy the
      detour binary and the entrypoint script (D2) into /usr/local/bin.
      The .dockerignore must exclude bin/, dist/, .git, .github, and any
      local config that would invalidate the build cache.
    acceptance_criteria:
      - "`docker build -t detour:test .` succeeds with no warnings beyond Alpine apk noise."
      - "Final image size ≤ 350 MB (`docker image inspect detour:test -f '{{.Size}}'`)."
      - "Image contains: /usr/local/bin/detour, /usr/local/bin/claude (or /usr/local/lib/node_modules/@anthropic-ai/claude-code/bin/claude on PATH), /usr/local/bin/docker-entrypoint.sh, /sbin/tini."
      - "Image runs as root (UID 0) — explicitly NOT switching users in this iteration."
      - "Stage 1 builds with CGO_ENABLED=0 and -trimpath -ldflags='-s -w'."
      - "Pinned versions: golang base tag, alpine base tag, Claude Code npm package version."
    tdd_steps:
      1: "Write scripts/test-docker.sh stub that runs `docker build` and asserts exit 0 — see D8 for full version. For D1, a one-line `docker build -t detour:test .` check is enough."
      2: "Run the build — expect FAIL (Dockerfile does not exist)."
      3: "Author Dockerfile per docs/docker-container-plan.md §3."
      4: "Re-run build — expect PASS."
      5: "Run `docker image inspect detour:test --format '{{.Size}}'` and assert ≤ 350 * 1024 * 1024."
    validation_commands:
      - "docker build -t detour:test ."
      - "test \"$(docker image inspect detour:test --format '{{.Size}}')\" -le 367001600"
      - "docker run --rm --entrypoint sh detour:test -c 'command -v detour && command -v claude && command -v git && command -v curl && command -v bash && command -v tini'"
    fix_notes: ""

  - id: D2
    title: "Author the runtime entrypoint script"
    status: pending
    depends_on: []
    files_to_create:
      - scripts/docker-entrypoint.sh
    files_to_modify: []
    description: |
      Create a POSIX-sh entrypoint that:
        * Generates ANTHROPIC_DETOUR_AUTH if unset (32 chars from /dev/urandom).
        * Translates DETOUR_MODEL_NAME / DETOUR_MODEL_API / DETOUR_PORT env
          vars into detour CLI flags, omitting any that are empty.
        * Recognises a leading `--no-claude` flag and runs `detour` in
          proxy-only mode (used by smoke tests).
        * Forwards every other positional arg to claude via `detour ... -- "$@"`.
        * Execs through tini so signals reach both the proxy and claude.
      The script must be executable (chmod +x) and lint clean under shellcheck.
    acceptance_criteria:
      - "Script is POSIX sh (no bashisms) and passes `shellcheck -s sh scripts/docker-entrypoint.sh`."
      - "When DETOUR_MODEL_NAME and DETOUR_MODEL_API are unset, the script invokes `detour -- \"$@\"` (no --model-* flags)."
      - "When DETOUR_MODEL_NAME=red and DETOUR_MODEL_API=http://x are set, the script invokes `detour --model-name red --model-api http://x -- \"$@\"`."
      - "When ANTHROPIC_DETOUR_AUTH is unset on entry, it is set to a 32-char value before exec."
      - "When the first arg is --no-claude, the script runs detour without launching claude."
      - "Final command is invoked under `exec tini --`."
    tdd_steps:
      1: "Add a unit-style test: scripts/test-entrypoint.sh that source-runs the entrypoint with `_DRY_RUN=1` and asserts the constructed argv on stdout. Without _DRY_RUN it should `exec`, with it set it should `echo` the final argv and exit 0."
      2: "Run the test — expect FAIL (no script exists)."
      3: "Implement scripts/docker-entrypoint.sh with the dry-run hook."
      4: "Re-run the test — expect PASS for all four scenarios above."
    validation_commands:
      - "shellcheck -s sh scripts/docker-entrypoint.sh"
      - "scripts/test-entrypoint.sh"
      - "test -x scripts/docker-entrypoint.sh"
    fix_notes: ""

  - id: D3
    title: "Add Makefile targets for image build/test/publish"
    status: pending
    depends_on: [D1, D2]
    files_to_create: []
    files_to_modify:
      - Makefile
    description: |
      Add these phony targets:
        image:        builds detour:dev locally.
        image-test:   builds detour:dev and runs scripts/test-docker.sh.
        image-clean:  removes detour:dev image.
        image-publish: tags and pushes detour:dev to ghcr.io/trydydd/detour:dev (no-op if PUSH_REGISTRY env unset).
      Existing build/test/run/clean targets must keep working unchanged.
    acceptance_criteria:
      - "`make image` succeeds and produces a local image named detour:dev."
      - "`make image-test` runs scripts/test-docker.sh and exits 0."
      - "`make image-clean` removes detour:dev with no error if absent."
      - "Running `make build` / `make test` after image targets still works."
    tdd_steps:
      1: "Run `make image` — expect FAIL (target not defined)."
      2: "Add the targets to Makefile."
      3: "Run `make image && make image-test && make image-clean` — all PASS."
      4: "Run `make test` — still PASS (no Go regressions)."
    validation_commands:
      - "make image"
      - "make image-test"
      - "make image-clean"
      - "make test"
    fix_notes: ""

  - id: D4
    title: "Smoke test: container runs detour --help via --no-claude path"
    status: pending
    depends_on: [D1, D2]
    files_to_create:
      - scripts/test-docker.sh
    files_to_modify: []
    description: |
      Create the canonical smoke test. The script:
        1. Builds detour:test (or reuses if SKIP_BUILD=1).
        2. Asserts image size ≤ 350 MiB.
        3. Runs `docker run --rm detour:test --no-claude --help` and asserts
           the output contains `--model-name` (proves the binary is the right
           one and CLI parsing works).
        4. Runs `docker run --rm detour:test --no-claude --version` and
           asserts the output is non-empty.
      The script must be idempotent and runnable from CI.
    acceptance_criteria:
      - "scripts/test-docker.sh exits 0 on a clean machine after `docker build` succeeds."
      - "Script honours SKIP_BUILD=1 to skip the build step."
      - "Script prints a clear PASS/FAIL banner per check."
      - "Failing any single check makes the script exit non-zero."
    tdd_steps:
      1: "Write the script with all four checks calling out their own pass/fail line."
      2: "Run it without the image present — expect early FAIL on build or already-built check."
      3: "Build via `make image-test` — expect PASS for all four checks."
    validation_commands:
      - "bash scripts/test-docker.sh"
    fix_notes: ""

  - id: D5
    title: "Integration test: mockllm round-trip through the container"
    status: pending
    depends_on: [D4]
    files_to_create: []
    files_to_modify:
      - scripts/test-docker.sh
    description: |
      Extend scripts/test-docker.sh with an integration check that:
        1. Starts cmd/mockllm on the host on a free port (randomly chosen,
           bound to 127.0.0.1 only).
        2. Runs the container with --network=host (Linux) or
           --add-host=host.docker.internal=host-gateway (other), passing
           DETOUR_MODEL_NAME=detour-mock and DETOUR_MODEL_API pointed at the
           mock, and `--no-claude` so the container stays in proxy-only mode.
        3. Sends a /v1/messages POST to the container's proxy port using
           the auto-generated ANTHROPIC_DETOUR_AUTH and the detour-mock
           model name.
        4. Asserts the response body contains "THIS IS DETOUR TEST!".
        5. Tears down both processes cleanly.
    acceptance_criteria:
      - "Round-trip test passes on Linux runners (the project's CI target)."
      - "Test cleans up the mockllm process and container even on failure."
      - "Test fails clearly if the response body lacks the sentinel string."
    tdd_steps:
      1: "Write the integration block; expect FAIL (network plumbing or auth header not yet wired)."
      2: "Iterate on the docker network flags and curl invocation until PASS."
      3: "Add a teardown trap to kill mockllm and `docker rm -f` the container."
    validation_commands:
      - "bash scripts/test-docker.sh"
    fix_notes: ""

  - id: D6
    title: "CI: build + smoke + size assertion on every PR"
    status: pending
    depends_on: [D4]
    files_to_create: []
    files_to_modify:
      - .github/workflows/ci.yml
    description: |
      Add a `docker` job to ci.yml that runs on ubuntu-latest:
        - Checks out the repo.
        - Sets up QEMU + Buildx (multi-arch friendly even if we only build amd64 in CI).
        - Runs `make image-test`.
        - Caches the docker layer cache via actions/cache or buildx --cache-to.
      The job must be required for merge.
    acceptance_criteria:
      - "ci.yml has a `docker` job that runs on push and pull_request."
      - "Job uses docker/setup-buildx-action and runs make image-test."
      - "Job leverages registry-less buildx caching (type=gha)."
      - "Existing Go-test job is not broken."
    tdd_steps:
      1: "Push branch with the new job; observe failure if any of D1-D4 are stale."
      2: "Iterate on caching and timeout settings until the job is green and ≤ 5 min."
      3: "Mark the job as required in repo branch protection (manual step — note in fix_notes)."
    validation_commands:
      - "yamllint -d '{rules: {line-length: disable}}' .github/workflows/ci.yml"
      - "act -j docker --container-architecture linux/amd64  # optional: only if act is installed"
    fix_notes: ""

  - id: D7
    title: "Release: publish image alongside binaries"
    status: pending
    depends_on: [D6]
    files_to_create: []
    files_to_modify:
      - .github/workflows/release.yml
    description: |
      On tag push (vX.Y.Z), build and push to ghcr.io/trydydd/detour with
      tags `:vX.Y.Z` and `:latest`. On push to default branch, also tag
      `:edge` and `:sha-<short>`. Use docker/login-action with
      ${{ secrets.GITHUB_TOKEN }}; no extra secrets required.
      Build amd64 and arm64 with buildx.
    acceptance_criteria:
      - "release.yml job `image-publish` triggers on tag and on default-branch push."
      - "Pushed manifests cover linux/amd64 and linux/arm64."
      - "Tag set on a release: vX.Y.Z and latest. On main: edge and sha-<short>."
      - "GoReleaser binary publishing is not regressed."
    tdd_steps:
      1: "Add the job; trigger via `gh workflow run` on a throwaway tag."
      2: "Verify image manifests on GHCR via `docker buildx imagetools inspect`."
      3: "Roll back the throwaway tag once verified."
    validation_commands:
      - "yamllint -d '{rules: {line-length: disable}}' .github/workflows/release.yml"
    fix_notes: ""

  - id: D8
    title: "Test: claude args pass-through (incl. --dangerously-skip-permissions)"
    status: pending
    depends_on: [D2, D4]
    files_to_create:
      - scripts/test-claude-args.sh
    files_to_modify:
      - scripts/test-docker.sh
    description: |
      Prove that `docker run … detour:test -- foo --bar` actually causes
      `claude` to receive `foo --bar`. Strategy:
        * Replace `claude` inside a derived test image with a tiny shim that
          writes `"$@"` to /tmp/claude-argv and exits 0.
        * Run the container with `-- --dangerously-skip-permissions --version`.
        * Assert /tmp/claude-argv (read via `docker cp`) contains the exact
          args.
      The derived image is built via a small inline Dockerfile in the
      script — no top-level repo file changes beyond scripts/.
    acceptance_criteria:
      - "Script builds detour:test-args from detour:test with the shim."
      - "After running with `-- --dangerously-skip-permissions --version`, the captured argv equals `--dangerously-skip-permissions --version`."
      - "Script also covers the empty case: no args after image name → claude receives no args."
      - "scripts/test-docker.sh invokes scripts/test-claude-args.sh as one of its checks."
    tdd_steps:
      1: "Write the shim and the harness — expect FAIL until D2 entrypoint flows args correctly."
      2: "Iterate on the entrypoint quoting until both scenarios PASS."
    validation_commands:
      - "bash scripts/test-claude-args.sh"
    fix_notes: ""

  - id: D9
    title: "Docs: README — Run with Docker section"
    status: pending
    depends_on: [D1, D2]
    files_to_create: []
    files_to_modify:
      - README.md
    description: |
      Add a `## Run with Docker` section between the existing `## Usage`
      and `## Verify routing` sections. Cover:
        * One-liner with ANTHROPIC_API_KEY.
        * Persistent OAuth via volume mount.
        * Pass-through of `--dangerously-skip-permissions`.
        * Note that `--model-name` / `--model-api` come from env vars.
      Keep the section under 60 lines. Link out to docs/docker.md for depth.
    acceptance_criteria:
      - "README has a `## Run with Docker` heading at H2."
      - "Three docker run examples render correctly in markdown preview."
      - "Section ends with a line linking to docs/docker.md."
      - "No existing README content removed or reordered."
    tdd_steps:
      1: "Run `markdown-link-check README.md` (if available) — baseline."
      2: "Add the section with examples and link."
      3: "Re-run the link check; copy a Docker example into a fresh shell to confirm it works against detour:test."
    validation_commands:
      - "grep -q '## Run with Docker' README.md"
      - "grep -q 'docs/docker.md' README.md"
    fix_notes: ""

  - id: D10
    title: "Docs: docs/docker.md long-form guide"
    status: pending
    depends_on: [D9]
    files_to_create:
      - docs/docker.md
    files_to_modify: []
    description: |
      Long-form companion guide. Sections:
        1. Image variants and tags.
        2. Build it yourself (`make image`).
        3. Auth modes (API key, persistent OAuth, ephemeral, none).
        4. Volume strategy: project mount, claude config volume.
        5. Networking to a host-side LLM (Linux vs macOS/Docker Desktop).
        6. Passing claude flags (link to --dangerously-skip-permissions doc).
        7. Cleartext upstream warning (link to AUDIT.md / H4).
        8. Troubleshooting checklist (claude exits 1, port already in use,
           token mismatch).
        9. Running rootless / non-root user notes.
    acceptance_criteria:
      - "docs/docker.md exists and contains all nine sections in order."
      - "All shell snippets are runnable copy-paste with the public image tag."
      - "File is ≤ 400 lines."
    tdd_steps:
      1: "Draft the file; spot-check each command on detour:test."
      2: "Have a human reviewer skim for completeness."
    validation_commands:
      - "test -f docs/docker.md"
      - "wc -l docs/docker.md | awk '{exit ($1>400)}'"
    fix_notes: ""

  - id: D11
    title: "Docs: CLAUDE.MD pointer for future Claude sessions"
    status: pending
    depends_on: [D10]
    files_to_create: []
    files_to_modify:
      - CLAUDE.MD
    description: |
      Append a short `## Docker Image` section to CLAUDE.MD pointing
      future Claude Code sessions at docs/docker.md and noting that
      ledger items live in work-ledger-docker.yaml. Two paragraphs max —
      the goal is discoverability, not duplication.
    acceptance_criteria:
      - "CLAUDE.MD has a `## Docker Image` heading."
      - "Section references docs/docker.md and work-ledger-docker.yaml by relative path."
      - "Section is ≤ 15 lines."
    tdd_steps:
      1: "Add the section."
      2: "Confirm the existing 'Code Exploration Policy' and 'Detour Proxy Notes' sections are untouched."
    validation_commands:
      - "grep -q '## Docker Image' CLAUDE.MD"
      - "grep -q 'docs/docker.md' CLAUDE.MD"
      - "grep -q 'work-ledger-docker.yaml' CLAUDE.MD"
    fix_notes: ""

  - id: D12
    title: "Hardening: run image as non-root (optional follow-up)"
    status: pending
    depends_on: [D7, D10]
    files_to_create: []
    files_to_modify:
      - Dockerfile
      - docs/docker.md
    description: |
      Add a `detour` user with UID/GID 1000 to the runtime stage and switch
      to it via USER. Adjust /root paths to /home/detour. Document that
      users mounting volumes must `chown 1000:1000` on the host. Keep the
      change behind a build arg `RUNTIME_USER` defaulting to detour, so
      `--build-arg RUNTIME_USER=root` reproduces the previous image for
      anyone who can't easily change file ownership.
    acceptance_criteria:
      - "Default image runs as UID 1000."
      - "Build arg `RUNTIME_USER=root` reverts to UID 0."
      - "All test scripts (D4, D5, D8) updated to handle the user change and still pass."
      - "docs/docker.md gains a § on volume-mount permissions."
    tdd_steps:
      1: "Add USER directive; expect tests to fail on volume permissions."
      2: "Update tests to chown or use --user 0 explicitly when mounting."
      3: "All validation commands pass."
    validation_commands:
      - "make image-test"
      - "docker run --rm detour:test id -u | grep -q '^1000$'"
    fix_notes: ""

phases:
  phase_1_foundation:
    items: [D1, D2]
    note: "Image and entrypoint exist and are individually testable."
  phase_2_tests:
    items: [D3, D4, D5, D8]
    note: "Local + CI-runnable test surface for the container."
  phase_3_ci_release:
    items: [D6, D7]
    note: "Pipeline knows how to verify and publish."
  phase_4_docs:
    items: [D9, D10, D11]
    note: "Users can find and use the image without reading source."
  phase_5_optional:
    items: [D12]
    note: "Hardening pass; ship only after the rest is stable."
